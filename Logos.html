<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logos — zjCanvas</title>
<meta name="description" content="The full collection of logo and brand mark designs by zjCanvas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="ambient" aria-hidden="true">
  <div class="blob blob--a"></div>
  <div class="blob blob--b"></div>
  <div class="blob blob--c"></div>
  <div class="noise"></div>
</div>

<header class="site-header">
  <nav class="navbar" id="navbar">
    <a href="index.html#home" class="brand">
      <img src="/public/logo.png" height="25" width="25" alt="zjCanvas logo" class="brand-logo">
      <span class="brand-name">zj<span class="text-gradient">Canvas</span></span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html#home">Home</a>
      <a href="index.html#works">Works</a>
      <a href="index.html#skills">Skills</a>
      <a href="index.html#contact">Contact</a>
    </div>
    <a href="index.html#contact" class="btn btn--gradient btn--sm">Let's Talk</a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>
</header>

<main>
  <section class="gallery-hero">
    <a href="index.html#works" class="pill-link">← Back to Works</a>
    <h1 class="gallery-title">Logo <span class="text-gradient">Designs</span></h1>
    <p class="gallery-sub">The full collection of logo and brand mark designs.</p>
  </section>

  <section>
    <div class="gallery-grid" id="logosGrid"></div>
  </section>
</main>

<footer class="site-footer">
  <a href="index.html#home" class="footer-wordmark">zjCanvas</a>
  <nav class="footer-links">
    <a href="index.html#home">Home</a>
    <a href="index.html#works">Works</a>
    <a href="index.html#skills">Skills</a>
    <a href="index.html#contact">Contact</a>
  </nav>
  <div class="footer-socials">
    <a href="#" aria-label="Instagram">IG</a>
    <a href="#" aria-label="LinkedIn">IN</a>
    <a href="#" aria-label="WhatsApp">WA</a>
  </div>
  <div class="footer-bottom">
    <span>© 2026 Zainab Jawed — zjCanvas</span>
    <span>Made with ❤️ in motion</span>
    <a href="index.html#home">Back to top ↑</a>
  </div>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">✕</button>
  <div class="lightbox-content" id="lightboxContent"></div>
</div>

<script src="data.js"></script>
<script src="gallery.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  buildGalleryGrid('logosGrid', LOGO_ITEMS, 'logo');
  initLightbox();
  initNavbar();
});
</script>
</body>
</html>
